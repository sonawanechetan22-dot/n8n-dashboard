<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>n8n Workflow Hub</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin:0;
  min-height:100vh;
  font-family:"Segoe UI", Arial, sans-serif;
  background:linear-gradient(135deg,#667eea,#764ba2);
  display:flex;
  justify-content:center;
  align-items:center;
}

.container {
  width:92%;
  max-width:430px;
  background:#ffffff;
  border-radius:25px;
  padding:25px;
  box-shadow:0 20px 40px rgba(0,0,0,0.25);
}

.header {
  text-align:center;
  margin-bottom:25px;
}

.header h1 {
  margin:0;
  font-size:28px;
  color:#222;
}

.header p {
  color:#777;
  margin-top:8px;
}

.status {
  background:#e8fff0;
  color:#159447;
  padding:10px;
  border-radius:12px;
  text-align:center;
  font-size:14px;
  margin-bottom:20px;
}

.grid {
  display:flex;
  flex-direction:column;
  gap:14px;
}

button {

  border:none;
  width:100%;
  padding:18px;
  border-radius:16px;
  font-size:17px;
  font-weight:600;
  cursor:pointer;
  color:white;

  display:flex;
  align-items:center;
  gap:15px;

  box-shadow:0 6px 15px rgba(0,0,0,0.15);
  transition:0.2s;
}


button:hover {
  transform:translateY(-3px);
}

button:active {
  transform:scale(0.97);
}


.student {
 background:#2563eb;
}

.notes {
 background:#16a34a;
}

.admin {
 background:#7c3aed;
}

.receipt {
 background:#ea580c;
}

.home {
 background:#0891b2;
}


.icon {
 font-size:28px;
}

.footer {
 text-align:center;
 margin-top:25px;
 color:#999;
 font-size:13px;
}

</style>

</head>


<body>


<div class="container">

<div class="header">
<h1>⚡ Workflow Hub</h1>
<p>n8n Automation Dashboard</p>
</div>


<div class="status">
🟢 Public Server Connected
</div>


<div class="grid">


<button class="student" onclick="openWorkflow('student')">
<span class="icon">🎓</span>
Student Information
</button>


<button class="notes" onclick="openWorkflow('notes')">
<span class="icon">📚</span>
Students Notes
</button>


<button class="admin" onclick="openWorkflow('admin')">
<span class="icon">👤</span>
Admin Panel
</button>


<button class="receipt" onclick="openWorkflow('receipt')">
<span class="icon">🧾</span>
Receipt Scanner
</button>


<button class="home" onclick="openWorkflow('home')">
<span class="icon">🏠</span>
Home Network
</button>


</div>


<div class="footer">
Powered by n8n Automation
</div>


</div>



<script>


const BASE_URL = "https://localhost-0.tail42ff1b.ts.net";


const workflows = {

student:
"/webhook/d41cbcf2-1ce5-4352-8c45-994a4d0115e0/chat",

notes:
"/form/c1a62a3a-d693-4394-a5cc-e8f036cd186f",

admin:
"/form/c49eb190-6537-4a08-8f8e-bcfa4104862b",

receipt:
"/form/39d4415c-35f1-42d1-abd3-c2d5b87189d4",

home:
"/webhook/adf3f59e-0ce7-469c-a9f3-6125d7ff6f23/chat"

};


function openWorkflow(name){

window.location.href = BASE_URL + workflows[name];

}


</script>


</body>
</html>
